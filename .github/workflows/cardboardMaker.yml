name: Build Cardboard Native Libs

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build all native libs for armeabi-v7a and arm64-v8a
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install NDK and CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.2.9519653" \
            "cmake;3.22.1"

      - name: Build Cardboard SDK AAR
        run: ./gradlew :sdk:assembleRelease

      - name: Extract .so files from SDK AAR
        run: |
          mkdir -p app/libraries/jni/armeabi-v7a
          mkdir -p app/libraries/jni/arm64-v8a
          cp sdk/include/cardboard.h app/libraries/

          for abi in armeabi-v7a arm64-v8a; do
            unzip -j sdk/build/outputs/aar/sdk-release.aar \
              "jni/$abi/libGfxPluginCardboard.so" \
              -d app/libraries/jni/$abi/ || true
            unzip -j sdk/build/outputs/aar/sdk-release.aar \
              "jni/$abi/libcardboard_api.so" \
              -d app/libraries/jni/$abi/ || true
            unzip -j sdk/build/outputs/aar/sdk-release.aar \
              "jni/$abi/libcardboard_jni.so" \
              -d app/libraries/jni/$abi/ || true
          done

      - name: Build app JNI for armeabi-v7a
        run: |
          ./gradlew :hellocardboard-android:externalNativeBuildDebug \
            -Pandroid.injected.build.abi=armeabi-v7a

      - name: Build app JNI for arm64-v8a
        run: |
          ./gradlew :hellocardboard-android:externalNativeBuildDebug \
            -Pandroid.injected.build.abi=arm64-v8a

      - name: Collect all .so files
        run: |
          mkdir -p output/jni/armeabi-v7a
          mkdir -p output/jni/arm64-v8a

          # SDK .so files
          cp app/libraries/jni/armeabi-v7a/*.so output/jni/armeabi-v7a/ 2>/dev/null || true
          cp app/libraries/jni/arm64-v8a/*.so output/jni/arm64-v8a/ 2>/dev/null || true

          # App JNI .so files
          find hellocardboard-android/build/intermediates/cmake \
            -name "*.so" | while read f; do
              abi=$(echo "$f" | grep -oP "(armeabi-v7a|arm64-v8a)")
              [ -n "$abi" ] && cp "$f" "output/jni/$abi/"
            done

      - name: Copy libc++_shared.so from NDK
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/25.2.9519653"
          PREBUILT="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib"

          cp "$PREBUILT/arm-linux-androideabi/libc++_shared.so" \
            output/jni/armeabi-v7a/

          cp "$PREBUILT/aarch64-linux-android/libc++_shared.so" \
            output/jni/arm64-v8a/

      - name: Verify all required .so files are present
        run: |
          echo "--- Verifying output ---"
          all_ok=true
          for abi in armeabi-v7a arm64-v8a; do
            for lib in libGfxPluginCardboard.so libcardboard_jni.so libc++_shared.so; do
              if [ -f "output/jni/$abi/$lib" ]; then
                echo "OK  $abi/$lib"
              else
                echo "MISSING  $abi/$lib"
                all_ok=false
              fi
            done
          done
          if [ "$all_ok" = false ]; then
            echo "One or more required .so files are missing. Failing build."
            exit 1
          fi
          echo "All required .so files present."

      - name: Upload SDK AAR
        uses: actions/upload-artifact@v4
        with:
          name: cardboard-sdk-aar
          path: sdk/build/outputs/aar/sdk-release.aar
          retention-days: 30

      - name: Upload all native .so files
        uses: actions/upload-artifact@v4
        with:
          name: cardboard-native-libs
          path: output/
          retention-days: 30
